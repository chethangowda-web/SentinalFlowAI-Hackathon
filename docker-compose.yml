# =============================================================================
# SentinelFlow - Production Docker Compose
# =============================================================================
# Spins up the full SentinelFlow stack for production-like local testing.
# 
# Usage:
#   docker compose --env-file .env up -d
# =============================================================================

version: "3.9"

services:
  # ===========================================================================
  # Backend API (Mastra AI)
  # ===========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinelflow-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - sentinelflow-net

  # ===========================================================================
  # Frontend (Nginx static server for production-like testing)
  # ===========================================================================
  frontend:
    image: nginx:alpine
    container_name: sentinelflow-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - sentinelflow-net

  # ===========================================================================
  # (Optional) Observability Stack - uncomment if needed
  # ===========================================================================
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: sentinelflow-prometheus
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml
  #   ports:
  #     - "9090:9090"
  #   networks:
  #     - sentinelflow-net
  #
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: sentinelflow-grafana
  #   ports:
  #     - "3002:3000"
  #   environment:
  #     - GF_SECURITY_ADMIN_PASSWORD=admin
  #   volumes:
  #     - grafana-data:/var/lib/grafana
  #   networks:
  #     - sentinelflow-net

networks:
  sentinelflow-net:
    driver: bridge

volumes:
  # grafana-data:
