replicaCount: 2

image:
  repository: sentinelflow/backend
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: app.sentinelflow.ai
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sentinelflow-tls-secret
      hosts:
        - app.sentinelflow.ai

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi

env:
  NODE_ENV: "production"
  PORT: "3000"
  QDRANT_URL: "http://qdrant:6333"
  QDRANT_COLLECTION: "sentinelflow-incidents"
