services:
  - type: web
    name: sentinelflow-api
    runtime: node
    region: singapore
    plan: starter
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node .mastra/output/index.mjs
    healthCheckPath: /health
    autoDeploy: true
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: WS_PORT
        value: "3001"
      - key: LOG_LEVEL
        value: info
      - key: DB_SSL
        value: "true"
      - key: DB_POOL_SIZE
        value: "20"
      - key: QDRANT_COLLECTION
        value: sentinelflow-incidents
      - key: JWT_ACCESS_EXPIRY
        value: "15m"
      - key: JWT_REFRESH_EXPIRY
        value: "7d"
      - key: HUGGINGFACE_EMBEDDING_MODEL
        value: BAAI/bge-large-en-v1.5
      - key: ENKRYPTAI_BASE_URL
        value: https://api.enkryptai.com
      - key: ENKRYPTAI_TIMEOUT_MS
        value: "10000"
      - key: BRUTE_FORCE_MAX_ATTEMPTS
        value: "5"
      - key: NOTIFICATION_RETRY_LIMIT
        value: "3"
      - key: NOTIFICATION_QUEUE_SIZE
        value: "1000"
      - key: NOTIFICATION_TIMEOUT
        value: "5000"

      # Sensitive - set via Render Dashboard
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENKRYPTAI_API_KEY
        sync: false
      - key: ENKRYPTAI_GUARDRAIL_NAME
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: TEAMS_WEBHOOK_URL
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
